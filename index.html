<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker — เข้าสู่ระบบ</title>

  <!-- TailwindCSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide Icons -->
  <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.js"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/styles.css">

  <!-- PWA -->
  <meta name="theme-color" content="#0f172a">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <script src="./pwa-register.js?v=20260430-2" defer></script>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

  <!-- Login Card -->
  <div class="w-full max-w-md page-transition">

    <!-- Logo + Title -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-500 rounded-2xl mb-4 shadow-lg">
        <i data-lucide="wallet" class="w-8 h-8 text-white"></i>
      </div>
      <h1 class="text-2xl font-bold text-slate-800">Expense Tracker</h1>
      <p class="text-slate-500 mt-2">จัดการค่าใช้จ่ายอย่างชาญฉลาด</p>
    </div>

    <!-- Login Card -->
    <div class="bg-white rounded-xl shadow-lg p-8">
      <h2 class="text-lg font-semibold text-slate-800 text-center mb-6">
        เข้าสู่ระบบ
      </h2>

      <!-- Google Login Button -->
      <button
        onclick="Auth.signInWithGoogle()"
        class="w-full flex items-center justify-center gap-3
               bg-white border-2 border-slate-200 rounded-lg px-4 py-3
               text-slate-700 font-medium
               hover:bg-slate-50 hover:border-slate-300
               transition-all duration-200
               active:scale-[0.98]"
      >
        <!-- Google "G" icon (inline SVG) -->
        <svg class="w-5 h-5" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        เข้าสู่ระบบด้วย Google
      </button>

      <!-- Divider -->
      <div class="mt-6 text-center">
        <p class="text-xs text-slate-400">
          ข้อมูลของคุณปลอดภัยและเข้าถึงได้เฉพาะคุณเท่านั้น
        </p>
      </div>
    </div>

    <!-- Footer -->
    <p class="text-center text-xs text-slate-400 mt-6">
      Expense Tracker v1.0 — Built with Supabase
    </p>
  </div>

  <!-- Scripts (เรียงลำดับสำคัญ — config ก่อน auth) -->
  <script src="js/config.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/auth.js"></script>

  <script>
    // เปิด Lucide icons
    lucide.createIcons();

    // ถ้า login แล้ว → ไปหน้า dashboard เลย
    Auth.redirectIfLoggedIn();
  </script>

</body>
</html>
